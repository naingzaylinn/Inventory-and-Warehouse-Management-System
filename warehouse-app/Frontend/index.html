<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STOCKER — Warehouse Management</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: sans-serif; font-size: 14px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
      th { background: #1a237e; color: white; }
      tr:hover { background: #f0f0f0; }
      input, select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
      button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
      .btn-primary { background: #1a237e; color: white; }
      .btn-danger { background: #c62828; color: white; }
      .btn-secondary { background: #888; color: white; }
      .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); display: flex;
        align-items: center; justify-content: center; z-index: 1000;
      }
      .modal { background: white; padding: 24px; border-radius: 8px; min-width: 500px; max-height: 90vh; overflow-y: auto; }
      .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
      .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px; }
      .form-group label { font-size: 12px; color: #555; font-weight: 500; }
      .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
      .page-title { font-size: 20px; font-weight: 600; color: #1a237e; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
